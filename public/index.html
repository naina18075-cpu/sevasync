<!DOCTYPE html>
<html>
<head>
  <title>SevaSync</title>
  <style>
    body { font-family: Arial; background:#f5f5f5; text-align:center; }
    .card { background:white; padding:20px; margin:20px; border-radius:10px; }
    input { padding:10px; margin:10px; }
    button { padding:10px 20px; background:green; color:white; border:none; }
  </style>
</head>
<body>

<h1>SevaSync 🚀</h1>
<p>Smart NGO Resource Platform</p>

<h2>Submit Your Need</h2>

<input id="need" placeholder="Enter need (food, medical, etc)">
<br>
<button onclick="addNeed()">Submit</button>

<h2>Live Needs</h2>
<div id="list"></div>

<script>
function addNeed(){
  let need = document.getElementById("need").value;
  if(need === "") return;
  
  let div = document.createElement("div");
  div.className="card";
  div.innerHTML = "<h3>"+need+"</h3><button onclick='this.innerText=\"Assigned\"'>Assign Volunteer</button>";
  
  document.getElementById("list").appendChild(div);
}
</script>

</body>
</html>
