<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SevaSync - NGO Resource Platform</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        header { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); margin-bottom: 30px; text-align: center; }
        h1 { color: #667eea; font-size: 2.5em; margin-bottom: 10px; }
        .tabs { display: flex; gap: 10px; margin-bottom: 30px; flex-wrap: wrap; justify-content: center; }
        .tab-btn { padding: 12px 30px; border: none; background: white; color: #667eea; font-weight: bold; border-radius: 10px; cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .tab-btn.active { background: #667eea; color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .form-section { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; color: #333; font-weight: bold; margin-bottom: 8px; }
        input, select, textarea { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 8px; font-size: 1em; }
        button { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 12px 30px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; }
        .request-card { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .requests-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 20px; }
        .status-badge { display: inline-block; padding: 6px 12px; border-radius: 20px; font-weight: bold; font-size: 0.8em; }
        .status-open { background: #FFE5E5; color: #C92A2A; }
        .status-assigned { background: #D3F9D8; color: #2B8A3E; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 20px; border-radius: 15px; text-align: center; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        .stat-number { font-size: 2.5em; font-weight: bold; color: #667eea; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🚀 SevaSync</h1>
            <p>Smart NGO Resource Platform - Connect Needs with Solutions</p>
        </header>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('requests')">📋 Requests</button>
            <button class="tab-btn" onclick="switchTab('submit')">➕ Submit</button>
            <button class="tab-btn" onclick="switchTab('volunteers')">👥 Volunteers</button>
            <button class="tab-btn" onclick="switchTab('dashboard')">📊 Dashboard</button>
        </div>

        <div id="dashboard" class="tab-content">
            <div class="stats-grid">
                <div class="stat-card"><div class="stat-number" id="totalRequests">0</div><div>Total Requests</div></div>
                <div class="stat-card"><div class="stat-number" id="openRequests">0</div><div>Open</div></div>
                <div class="stat-card"><div class="stat-number" id="assignedRequests">0</div><div>Assigned</div></div>
            </div>
        </div>

        <div id="requests" class="tab-content active">
            <div class="requests-grid" id="requestsList"></div>
        </div>

        <div id="submit" class="tab-content">
            <div class="form-section">
                <h2>Submit Request</h2>
                <form id="requestForm" onsubmit="submitRequest(event)">
                    <div class="form-group">
                        <label>Title *</label>
                        <input type="text" id="title" required>
                    </div>
                    <div class="form-group">
                        <label>Category *</label>
                        <select id="category" required>
                            <option value="">Select</option>
                            <option value="Food">🍕 Food</option>
                            <option value="Medical">🏥 Medical</option>
                            <option value="Education">📚 Education</option>
                            <option value="Shelter">🏠 Shelter</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Location *</label>
                        <input type="text" id="location" required>
                    </div>
                    <div class="form-group">
                        <label>Description *</label>
                        <textarea id="description" required></textarea>
                    </div>
                    <button type="submit">Submit</button>
                </form>
            </div>
        </div>

        <div id="volunteers" class="tab-content">
            <div class="form-section">
                <h2>Register Volunteer</h2>
                <form id="volForm" onsubmit="registerVolunteer(event)">
                    <div class="form-group">
                        <label>Name *</label>
                        <input type="text" id="volName" required>
                    </div>
                    <div class="form-group">
                        <label>Phone *</label>
                        <input type="tel" id="volPhone" required>
                    </div>
                    <div class="form-group">
                        <label>Skills *</label>
                        <input type="text" id="volSkills" required>
                    </div>
                    <button type="submit">Register</button>
                </form>
            </div>
            <div class="form-section">
                <h2>Volunteers</h2>
                <div id="volunteersList"></div>
            </div>
        </div>
    </div>

    <script>
        function getData() {
            return JSON.parse(localStorage.getItem('sevasync')) || { requests: [], volunteers: [] };
        }
        function saveData(data) {
            localStorage.setItem('sevasync', JSON.stringify(data));
        }
        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tab).classList.add('active');
            event.target.classList.add('active');
            if (tab === 'requests') displayRequests();
            if (tab === 'volunteers') displayVolunteers();
            if (tab === 'dashboard') updateDashboard();
        }
        function submitRequest(e) {
            e.preventDefault();
            const data = getData();
            data.requests.push({
                id: Date.now(),
                title: document.getElementById('title').value,
                category: document.getElementById('category').value,
                location: document.getElementById('location').value,
                description: document.getElementById('description').value,
                status: 'open',
                timestamp: new Date().toLocaleString()
            });
            saveData(data);
            document.getElementById('requestForm').reset();
            alert('Request submitted!');
        }
        function registerVolunteer(e) {
            e.preventDefault();
            const data = getData();
            data.volunteers.push({
                name: document.getElementById('volName').value,
                phone: document.getElementById('volPhone').value,
                skills: document.getElementById('volSkills').value
            });
            saveData(data);
            document.getElementById('volForm').reset();
            displayVolunteers();
            alert('Volunteer registered!');
        }
        function displayRequests() {
            const data = getData();
            const html = data.requests.map(r => `
                <div class="request-card">
                    <h3>${r.title}</h3>
                    <p><strong>Category:</strong> ${r.category}</p>
                    <p><strong>Location:</strong> ${r.location}</p>
                    <p><strong>Description:</strong> ${r.description}</p>
                    <span class="status-badge status-${r.status}">${r.status}</span>
                    <p style="font-size: 0.8em; color: #999; margin-top: 10px;">${r.timestamp}</p>
                </div>
            `).join('');
            document.getElementById('requestsList').innerHTML = html || '<p>No requests yet</p>';
        }
        function displayVolunteers() {
            const data = getData();
            const html = data.volunteers.map(v => `
                <div style="border: 1px solid #ddd; padding: 15px; border-radius: 8px; margin-bottom: 10px;">
                    <p><strong>${v.name}</strong></p>
                    <p>📞 ${v.phone} | 🎯 ${v.skills}</p>
                </div>
            `).join('');
            document.getElementById('volunteersList').innerHTML = html || '<p>No volunteers</p>';
        }
        function updateDashboard() {
            const data = getData();
            document.getElementById('totalRequests').textContent = data.requests.length;
            document.getElementById('openRequests').textContent = data.requests.filter(r => r.status === 'open').length;
            document.getElementById('assignedRequests').textContent = data.requests.filter(r => r.status === 'assigned').length;
        }
        displayRequests();
    </script>
</body>
</html>
